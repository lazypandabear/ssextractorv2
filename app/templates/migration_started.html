<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Migration In Progress</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <div class="container my-5">
    <h1>Migration In Progress</h1>
    <p id="status" class="alert alert-info">Starting migration...</p>
    <div id="details" class="text-muted small">Waiting for file activity...</div>
    <button id="cancelButton" class="btn btn-danger">Cancel Migration</button>
  </div>
  <script>
    const jobId = "{{ job_id }}";
    function pollStatus() {
    $.ajax({
      url: '/status',
      data: { job_id: jobId },
      method: 'GET',
      success: function(data) {
        const progressText = data.progress || "Working...";
        $('#status').text("Status: " + progressText);
        if (data.details) {
          $('#details').text(data.details);
        }
        // If the migration is no longer running (e.g. cancelled or completed)
        if (!data.running) {
          clearInterval(statusInterval);
          const isCompleted = progressText.toLowerCase().includes("completed");
          if (isCompleted) {
            alert("Migration completed. Click OK to return to the main page.");
            window.location.href = '/';
            return;
          }
          // Redirect to home after a short delay (e.g. 2 seconds)
          setTimeout(function(){
            window.location.href = '/';
          }, 2000);
        }
      }
    });
  }

  $('#cancelButton').click(function(){
    $.ajax({
      url: '/cancel',
      data: { job_id: jobId },
      method: 'POST',
      success: function(data) {
        $('#status').text("Migration cancellation requested.");
      }
    });
  });

  var statusInterval = setInterval(pollStatus, 1000);
</script>
</body>
</html>
